ShortDescription: Memora MCP — fork of codebase-memory-mcp, code intelligence for AI coding agents
Description: |-
  memora-mcp is a fork of codebase-memory-mcp, maintaining the same fast single
  static binary MCP server that indexes codebases at extreme speed and exposes 15
  MCP tools for AI coding agents. Full indexes an average repository in milliseconds,
  the Linux kernel (28M LOC) in 3 minutes. Supports 158 languages via vendored
  tree-sitter grammars. Zero dependencies.
